{% extends "base.html" %}

{% block title %}SEVA Arogya - CloudWatch Logs{% endblock %}

{% block content %}
<div class="relative flex h-screen max-w-md mx-auto flex-col bg-white dark:bg-background-dark overflow-hidden shadow-2xl">
    <!-- Header -->
    <div class="px-6 pt-12 pb-4 border-b border-slate-100 dark:border-slate-800">
        <div class="flex items-center justify-between mb-4">
            <button onclick="window.navigateWithTransition('/home')" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-slate-800 dark:text-white">CloudWatch Logs</h1>
            <button id="refresh-btn" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">refresh</span>
            </button>
        </div>
        
        <!-- Search Input -->
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
            <input 
                id="search-input"
                class="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-xl py-3 pl-10 pr-4 text-sm text-slate-600 dark:text-slate-300 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 transition-all" 
                placeholder="Search logs..." 
                type="text"
            />
        </div>
    </div>
    
    <!-- Filters -->
    <div class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <select id="time-range-filter" class="text-xs px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 focus:ring-2 focus:ring-primary/20 outline-none">
                <option value="1">Last 1 hour</option>
                <option value="6">Last 6 hours</option>
                <option value="24" selected>Last 24 hours</option>
                <option value="72">Last 3 days</option>
                <option value="168">Last 7 days</option>
            </select>
            
            <label class="flex items-center gap-2 text-xs px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 cursor-pointer">
                <input id="auto-refresh-toggle" type="checkbox" class="rounded text-primary focus:ring-primary" />
                <span>Auto-refresh</span>
            </label>
        </div>
    </div>
    
    <!-- Loading State -->
    <div id="loading-state" class="flex-1 flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
            <p class="mt-2 text-sm text-slate-500">Loading logs...</p>
        </div>
    </div>
    
    <!-- Error State -->
    <div id="error-state" class="hidden flex-1 flex items-center justify-center">
        <div class="text-center px-6">
            <span class="material-symbols-outlined text-[64px] text-red-300 dark:text-red-700">error</span>
            <p id="error-message" class="mt-2 text-sm text-red-500">Failed to load logs</p>
            <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-primary text-white rounded-lg text-sm">Retry</button>
        </div>
    </div>
    
    <!-- Empty State -->
    <div id="empty-state" class="hidden flex-1 flex items-center justify-center">
        <div class="text-center px-6">
            <span class="material-symbols-outlined text-[64px] text-slate-300 dark:text-slate-700">description</span>
            <p class="mt-2 text-sm text-slate-500">No logs found</p>
        </div>
    </div>
    
    <!-- Logs List -->
    <div id="logs-content" class="hidden flex-1 overflow-y-auto">
        <div id="logs-container" class="px-6 py-4 space-y-2">
            <!-- Logs will be inserted here -->
        </div>
        
        <!-- Load More Button -->
        <div id="load-more-container" class="hidden px-6 py-4">
            <button id="load-more-btn" class="w-full py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                Load More
            </button>
        </div>
    </div>
    
    <!-- Bottom Navigation Bar -->
    <div class="pb-4 flex justify-center">
        <div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    .log-entry {
        @apply bg-slate-50 dark:bg-slate-900/50 rounded-lg p-3 text-xs font-mono;
    }
    
    .log-timestamp {
        @apply text-slate-500 dark:text-slate-400 font-semibold mb-1;
    }
    
    .log-message {
        @apply text-slate-700 dark:text-slate-300 whitespace-pre-wrap break-words;
    }
    
    .log-level-error {
        @apply border-l-4 border-red-500 bg-red-50 dark:bg-red-900/20;
    }
    
    .log-level-warning {
        @apply border-l-4 border-yellow-500 bg-yellow-50 dark:bg-yellow-900/20;
    }
    
    .log-level-info {
        @apply border-l-4 border-blue-500 bg-blue-50 dark:bg-blue-900/20;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/logs_viewer.js') }}"></script>
{% endblock %}
