{% extends "base.html" %}

{% block title %}SEVA Arogya - Prescription Config{% endblock %}

{% block content %}
<div class="relative flex   max-w-md mx-auto flex-col bg-white dark:bg-background-dark overflow-hidden shadow-2xl">
    <div class="px-6 pt-12 pb-4 border-b border-slate-100 dark:border-slate-800">
        <div class="flex items-center justify-between">
            <button id="back-btn" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold text-slate-800 dark:text-white">Prescription Config</h1>
            <button id="reload-config-btn" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">refresh</span>
            </button>
        </div>
        <p id="config-page-subtitle" class="mt-2 text-xs text-slate-500">Hospital configuration</p>
    </div>

    <div id="loading-state" class="flex-1 flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
            <p class="mt-2 text-sm text-slate-500">Loading prescription config...</p>
        </div>
    </div>

    <div id="error-state" class="hidden flex-1 flex items-center justify-center">
        <div class="text-center px-6">
            <span class="material-symbols-outlined text-[64px] text-red-300 dark:text-red-700">error</span>
            <p id="error-message" class="mt-2 text-sm text-red-500">Failed to load config</p>
        </div>
    </div>

    <div id="config-content" class="hidden flex-1 overflow-y-auto px-6 py-4 space-y-4">
        <div class="bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-300">Config Summary</h2>
                <span id="config-source-badge" class="text-[10px] px-2 py-1 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300">source</span>
            </div>
            <div id="config-summary" class="text-xs text-slate-600 dark:text-slate-400 space-y-1"></div>
            <div id="section-summary" class="mt-3 space-y-2"></div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button id="generate-default-btn" class="py-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                Generate from Default
            </button>
            <button id="save-config-btn" class="py-2.5 rounded-lg bg-primary text-white text-sm font-medium hover:bg-primary/90 transition-colors">
                Save Config
            </button>
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-2">JSON Editor</label>
            <textarea id="config-json-editor" rows="16" class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-xs font-mono text-slate-700 dark:text-slate-200 p-3 focus:outline-none focus:ring-2 focus:ring-primary/30"></textarea>
        </div>
    </div>

    <div class="pb-4 flex justify-center">
        <div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const selectedHospitalId = {{ selected_hospital_id|tojson }};
</script>
<script src="{{ url_for('static', filename='js/prescription_config_settings.js') }}"></script>
{% endblock %}
