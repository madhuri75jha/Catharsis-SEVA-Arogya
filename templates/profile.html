{% extends "base.html" %}

{% block title %}SEVA Arogya - Profile{% endblock %}

{% block content %}
<div class="relative flex h-screen max-w-md mx-auto flex-col bg-white dark:bg-background-dark overflow-hidden shadow-2xl">
    <!-- Header -->
    <div class="px-6 pt-12 pb-4 border-b border-slate-100 dark:border-slate-800">
        <div class="flex items-center justify-between">
            <button onclick="window.location.href='/home'" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-slate-800 dark:text-white">Profile</h1>
            <div class="w-10"></div>
        </div>
    </div>
    
    <!-- Loading State -->
    <div id="loading-state" class="flex-1 flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
            <p class="mt-2 text-sm text-slate-500">Loading profile...</p>
        </div>
    </div>
    
    <!-- Error State -->
    <div id="error-state" class="hidden flex-1 flex items-center justify-center">
        <div class="text-center px-6">
            <span class="material-symbols-outlined text-[64px] text-red-300 dark:text-red-700">error</span>
            <p id="error-message" class="mt-2 text-sm text-red-500">Failed to load profile</p>
            <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-primary text-white rounded-lg text-sm">Retry</button>
        </div>
    </div>
    
    <!-- Profile Content -->
    <div id="profile-content" class="hidden flex-1 overflow-y-auto">
        <!-- Profile Header -->
        <div class="px-6 py-8 bg-gradient-to-br from-primary/10 to-primary/5 dark:from-primary/20 dark:to-primary/10 border-b border-slate-100 dark:border-slate-800">
            <div class="flex flex-col items-center text-center">
                <!-- Profile Picture / Initials -->
                <div class="w-24 h-24 rounded-full bg-primary/20 flex items-center justify-center mb-4">
                    <span id="profile-initials" class="text-3xl font-bold text-primary">?</span>
                </div>
                
                <!-- Name -->
                <h2 id="profile-name" class="text-2xl font-bold text-slate-800 dark:text-white mb-1">
                    Loading...
                </h2>
                
                <!-- Email -->
                <p id="profile-email" class="text-sm text-slate-600 dark:text-slate-400 mb-2">
                    ...
                </p>
                
                <!-- Role Badge -->
                <span id="profile-role" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-primary/20 text-primary">
                    ...
                </span>
            </div>
        </div>
        
        <!-- Profile Details -->
        <div class="px-6 py-4 space-y-4">
            <!-- Specialty -->
            <div id="specialty-section" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
                    Specialty
                </label>
                <p id="profile-specialty" class="text-base text-slate-800 dark:text-white">
                    ...
                </p>
            </div>
            
            <!-- Hospital -->
            <div id="hospital-section" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
                    Hospital
                </label>
                <p id="profile-hospital" class="text-base text-slate-800 dark:text-white">
                    ...
                </p>
            </div>
            
            <!-- Availability -->
            <div id="availability-section" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
                    Availability
                </label>
                <p id="profile-availability" class="text-base text-slate-800 dark:text-white">
                    ...
                </p>
            </div>
            
            <!-- Signature -->
            <div id="signature-section" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">
                    Signature
                </label>
                <div class="bg-slate-50 dark:bg-slate-900/50 rounded-lg p-4 border border-slate-200 dark:border-slate-700">
                    <img id="profile-signature" src="" alt="Doctor Signature" class="max-w-full h-auto" />
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation Bar -->
    <div class="pb-4 flex justify-center">
        <div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
